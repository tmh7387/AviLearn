<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Colors · Foreground (text)</div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;align-items:center;gap:18px">
      <div style="width:40px;height:40px;background:#e6e9f2;border-radius:6px"></div>
      <div><div style="font-size:16px;font-weight:600;color:#e6e9f2">Foreground 1 · primary text</div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#a4a9bd">#E6E9F2 · headings, body, KPI values</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:18px">
      <div style="width:40px;height:40px;background:#a4a9bd;border-radius:6px"></div>
      <div><div style="font-size:16px;font-weight:500;color:#a4a9bd">Foreground 2 · secondary</div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#6b7187">#A4A9BD · labels, metadata, captions</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:18px">
      <div style="width:40px;height:40px;background:#6b7187;border-radius:6px"></div>
      <div><div style="font-size:16px;font-weight:500;color:#6b7187">Foreground 3 · muted</div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#6b7187">#6B7187 · placeholders, disabled, dim</div></div>
    </div>
  </div>
</div></body></html>
