<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Colors · Status</div>
  <div class="row tight">
    <div class="swatch" style="background:#22c55e;color:#0a0d12"><div class="name">Success</div><div class="hex">#22C55E</div></div>
    <div class="swatch" style="background:#f59e0b;color:#0a0d12"><div class="name">Warn</div><div class="hex">#F59E0B</div></div>
    <div class="swatch" style="background:#ef4444;color:#fff"><div class="name">Danger</div><div class="hex">#EF4444</div></div>
    <div class="swatch" style="background:#3b82f6;color:#fff"><div class="name">Info</div><div class="hex">#3B82F6</div></div>
  </div>
  <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
    <span style="background:rgba(34,197,94,.15);color:#22c55e;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:500">● Active</span>
    <span style="background:rgba(245,158,11,.15);color:#f59e0b;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:500">● Pending</span>
    <span style="background:rgba(239,68,68,.15);color:#ef4444;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:500">● Failed</span>
    <span style="background:rgba(59,130,246,.15);color:#3b82f6;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:500">● Scheduled</span>
  </div>
</div></body></html>
