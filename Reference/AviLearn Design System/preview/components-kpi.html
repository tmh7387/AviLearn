<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Components · KPI card</div>
  <div style="display:flex;gap:12px">
    <div style="background:#1c1f2a;border:1px solid #2c3142;border-radius:6px;padding:14px 16px;flex:1;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:#2dd4bf"></div>
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#6b7187;font-weight:600">Hours flown</div>
      <div style="font-size:28px;font-weight:600;color:#e6e9f2;font-variant-numeric:tabular-nums;letter-spacing:-0.01em;margin-top:4px">142.7</div>
      <div style="font-size:12px;color:#22c55e;margin-top:2px">↗ +8.4 vs last week</div>
    </div>
    <div style="background:#1c1f2a;border:1px solid #2c3142;border-radius:6px;padding:14px 16px;flex:1;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:#3b82f6"></div>
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#6b7187;font-weight:600">Active students</div>
      <div style="font-size:28px;font-weight:600;color:#e6e9f2;font-variant-numeric:tabular-nums;letter-spacing:-0.01em;margin-top:4px">47</div>
      <div style="font-size:12px;color:#a4a9bd;margin-top:2px">12 lessons due</div>
    </div>
    <div style="background:#1c1f2a;border:1px solid #2c3142;border-radius:6px;padding:14px 16px;flex:1;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:#f59e0b"></div>
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#6b7187;font-weight:600">Pending grades</div>
      <div style="font-size:28px;font-weight:600;color:#e6e9f2;font-variant-numeric:tabular-nums;letter-spacing:-0.01em;margin-top:4px">9</div>
      <div style="font-size:12px;color:#f59e0b;margin-top:2px">Oldest 3 days</div>
    </div>
  </div>
</div></body></html>
