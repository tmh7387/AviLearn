<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Brand · Iconography (Lucide, 1.5px stroke)</div>
  <div style="display:grid;grid-template-columns:repeat(8, 1fr);gap:14px;color:#e6e9f2">
    <div style="text-align:center"><i data-lucide="layout-dashboard" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">dashboard</div></div>
    <div style="text-align:center"><i data-lucide="users" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">users</div></div>
    <div style="text-align:center"><i data-lucide="book-open" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">book-open</div></div>
    <div style="text-align:center"><i data-lucide="calendar" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">calendar</div></div>
    <div style="text-align:center"><i data-lucide="message-square" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">chat</div></div>
    <div style="text-align:center"><i data-lucide="bar-chart-3" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">charts</div></div>
    <div style="text-align:center"><i data-lucide="bell" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">bell</div></div>
    <div style="text-align:center"><i data-lucide="settings" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">settings</div></div>
    <div style="text-align:center;color:#2dd4bf"><i data-lucide="plane" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">plane</div></div>
    <div style="text-align:center;color:#2dd4bf"><i data-lucide="plane-takeoff" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">takeoff</div></div>
    <div style="text-align:center;color:#2dd4bf"><i data-lucide="plane-landing" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">landing</div></div>
    <div style="text-align:center;color:#2dd4bf"><i data-lucide="wind" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">wind</div></div>
    <div style="text-align:center;color:#2dd4bf"><i data-lucide="cloud" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">cloud</div></div>
    <div style="text-align:center;color:#2dd4bf"><i data-lucide="compass" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">compass</div></div>
    <div style="text-align:center;color:#2dd4bf"><i data-lucide="gauge" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">gauge</div></div>
    <div style="text-align:center;color:#2dd4bf"><i data-lucide="map" style="width:24px;height:24px"></i><div style="font-size:10px;color:#6b7187;margin-top:4px;font-family:'JetBrains Mono',monospace">map</div></div>
  </div>
  <script>lucide.createIcons();</script>
</div></body></html>
