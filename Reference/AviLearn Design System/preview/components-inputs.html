<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Components · Form inputs</div>
  <div style="display:flex;flex-direction:column;gap:10px;max-width:420px">
    <div>
      <label style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#a4a9bd;font-weight:600;display:block;margin-bottom:6px">Student name</label>
      <input style="width:100%;background:#14171f;color:#e6e9f2;border:1px solid #2c3142;border-radius:4px;padding:8px 12px;font-size:13px;font-family:inherit;box-sizing:border-box" value="Mayra Sibley" />
    </div>
    <div>
      <label style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#a4a9bd;font-weight:600;display:block;margin-bottom:6px">Aircraft tail</label>
      <input style="width:100%;background:#14171f;color:#2dd4bf;border:1px solid #2dd4bf;outline:2px solid rgba(45,212,191,.30);border-radius:4px;padding:8px 12px;font-size:13px;font-family:'JetBrains Mono',monospace;box-sizing:border-box" value="N1234A" />
    </div>
    <div>
      <label style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#a4a9bd;font-weight:600;display:block;margin-bottom:6px">Notes</label>
      <input placeholder="Brief notes for the next instructor…" style="width:100%;background:#14171f;color:#6b7187;border:1px solid #2c3142;border-radius:4px;padding:8px 12px;font-size:13px;font-family:inherit;box-sizing:border-box" />
    </div>
  </div>
</div></body></html>
