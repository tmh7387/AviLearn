<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Components · Buttons</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <button style="background:#2dd4bf;color:#14171f;border:0;padding:8px 16px;border-radius:4px;font-weight:600;font-size:13px;cursor:pointer">Schedule lesson</button>
    <button style="background:transparent;color:#e6e9f2;border:1px solid #3a4055;padding:7px 16px;border-radius:4px;font-weight:500;font-size:13px;cursor:pointer">Cancel</button>
    <button style="background:transparent;color:#2dd4bf;border:1px solid #2dd4bf;padding:7px 16px;border-radius:4px;font-weight:600;font-size:13px;cursor:pointer">View report</button>
    <button style="background:#ef4444;color:#fff;border:0;padding:8px 16px;border-radius:4px;font-weight:600;font-size:13px;cursor:pointer">Remove student</button>
    <button style="background:transparent;color:#a4a9bd;border:0;padding:8px 12px;border-radius:4px;font-weight:500;font-size:13px;cursor:pointer">More</button>
    <button style="background:#232735;color:#6b7187;border:0;padding:8px 16px;border-radius:4px;font-weight:600;font-size:13px;cursor:not-allowed" disabled>Disabled</button>
  </div>
  <div class="muted" style="margin-top:14px;font-size:12px">Primary · Secondary outlined · Brand outlined · Danger · Ghost · Disabled. 32px height. 4px radius.</div>
</div></body></html>
